{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/experience.css' %}">
    <link rel="stylesheet" href="{% static 'css/projects.css' %}">
    <link rel="stylesheet" href="{% static 'css/contact.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">



    <title>{% block title %}My Website{% endblock title %}</title>
</head>
<body>
    <div class="page-wrapper">

        <header>
            <nav class="sketch-navbar">
                <div class="brand-wrap">
                    <span class="brand-star">✦</span>
                    <div class="brand">BartoArts</div>
                    <span class="brand-star">✦</span>
                </div>

                <div class="nav-links">
                    <a href="{% url 'about_me' %}">About</a>
                    <a href="{% url 'blog' %}">Blog</a>
                    <a href="{% url 'projects' %}">Projects</a>
                    <a href="{% url 'experience' %}">Experience</a>
                    <a href="{% url 'contact' %}">Contact</a>
                </div>

                <button id="darkModeToggle" class="dark-btn">☾</button>
            </nav>
        </header>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>

        <footer class="sketch-footer">
            <div class="footer-content">
                <p class="footer-text">© 2026 BartoArts · ✨</p>

                <div class="footer-right">
                    <div class="social-links">
                        <a href="https://instagram.com/" target="_blank" class="social-icon" aria-label="Instagram">
                            <i class="bi bi-instagram"></i>
                        </a>
                        <a href="https://github.com/" target="_blank" class="social-icon" aria-label="GitHub">
                            <i class="bi bi-github"></i>
                        </a>
                        <a href="https://linkedin.com/" target="_blank" class="social-icon" aria-label="LinkedIn">
                            <i class="bi bi-linkedin"></i>
                        </a>
                    </div>

                    <a href="{% url 'contact' %}" class="contact-link">✉ Contact Me</a>
                </div>
            </div>
        </footer>

    </div>

    <script>
        const toggle = document.getElementById("darkModeToggle");

        toggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("theme", "dark");
            } else {
                localStorage.setItem("theme", "light");
            }
        });

        window.onload = () => {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.body.classList.add("dark-mode");
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
