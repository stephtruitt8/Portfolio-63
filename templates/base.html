{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6F" crossorigin="anonymous">
    
    <title>
        {% block title %}
        My Website
        {% endblock title %}
    </title>
        
</head>
<body>
    <!-- Navigation -->
     <header class="center">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <button id="darkModeToggle" class="btn btn-outline-light ms-3">Dark Mode</button>


                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="#">About me</a>
                        <a class="nav-link" href="#">Blog</a>
                        <a class="nav-link" href="#">Projects</a>
                        <a class="nav-link" href="#">Experience</a>
                        <a class="nav-link" href="#">Contact</a>
                            
                    </div>
                </div>
            </div>
        </nav>
     </header>

    <!-- content MAIN-->
     <main>
        {% block content %}

        {% endblock %}
     </main>

    <!-- Footer -->
     <footer>
        
        <div class="card">
            <h5 class="card-header">Featured</h5>
            <div class="card-body">
                <h5 class="card-title">Special title treatment</h5>
                <p class="card-text">With supporting text below as a natural lead-in to additional content.</p>
                <a href="#" class="btn btn-primary">Contact Me</a>
            </div>
        </div>

     </footer>
</body>
</html>
